<body>
  <div id="app">рҹҸғвҖҚрҹҸғвҖҚрҹҸғвҖҚрҹ’ЁеҠ иҪҪдёӯ...</div>
  <script>


    window.$docsify = {
      loadSidebar: true,
      subMaxLevel: 2,
      loadNavbar: false,
      coverpage: true,
      auto2top: true,
      name: 'XINGXING',
      repo: '',
      search: {
        paths: 'auto',
        placeholder: 'рҹ”Қ Type to search ',
        noData: 'рҹҳһ No Results! ',
        depth: 3
      },
      pagination: {
        previousText: 'дёҠдёҖз« иҠӮ',
        nextText: 'дёӢдёҖз« иҠӮ',
        crossChapter: true
      },
      count:{
        countable: true,
        position: 'top',
        margin: '10px',
        float: 'right',
        fontsize:'0.9em',
        color:'rgb(90,90,90)',
        language:'chinese',
        localization: {
          words: "",
          minute: ""
        },
        isExpected: true
      },
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === "tex") {
              return (
                      '<span class="tex">'+ katex.renderToString(code, {
                        throwOnError: false
                      })+'</span>'
              );
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      }
    }
  </script>
