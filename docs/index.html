<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <title>👌XINGXING</title>

  <!--- 网站图标 -->
  <link rel="shortcut icon" href="https://raw.githubusercontent.com/zhengstar94/zhengstar94.github.io/main/docs/assets/img/star.png">

  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="./assets/css/vue.css">
  <link rel="stylesheet" href="./assets/css/gitalk.css">

  <link rel="stylesheet" href="./assets/css/my.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">

  <link rel="stylesheet" href="./assets/css/katex.min.css">

  <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>

  <script src="//cdn.jsdelivr.net/npm/docsify-prism@latest/dist/docsify-prism.min.js"></script>


  <link href="https://cdn.bootcss.com/KaTeX/0.10.0/katex.min.css" rel="stylesheet">

  <link rel="stylesheet" href="./assets/css/topCss.css">
  <link rel="stylesheet" href="./assets/css/mid.css">

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css"/>

  <script src=./assets/js/docsify-katex.js"></script>


  <script src="https://cdn.bootcss.com/KaTeX/0.10.0/katex.min.js"></script>

  <!-- switch between day and night -->
  <link
          rel="stylesheet"
          href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css"
          title="docsify-darklight-theme"
          type="text/css"
  />
  <script
          src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"
          type="text/javascript">
  </script>


</head>
<body>
  <div id="app">🏃‍🏃‍🏃‍💨加载中...</div>
  <script>


    window.$docsify = {
      loadSidebar: true,
      subMaxLevel: 2,
      loadNavbar: false,
      coverpage: true,
      auto2top: true,
      name: 'XINGXING',
      repo: '',
      search: {
        paths: 'auto',
        placeholder: '🔍 Type to search ',
        noData: '😞 No Results! ',
        depth: 3
      },
      pagination: {
        previousText: '上一章节',
        nextText: '下一章节',
        crossChapter: true
      },
      count:{
        countable: true,
        position: 'top',
        margin: '10px',
        float: 'right',
        fontsize:'0.9em',
        color:'rgb(90,90,90)',
        language:'chinese',
        localization: {
          words: "",
          minute: ""
        },
        isExpected: true
      },
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === "tex") {
              return (
                      '<span class="tex">'+ katex.renderToString(code, {
                        throwOnError: false
                      })+'</span>'
              );
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      darklightTheme: {
        siteFont : "PT Sans",
        defaultTheme : 'dark',
        codeFontFamily : 'Roboto Mono, Monaco, courier, monospace',
        bodyFontSize : '17px',
        dark: {
          accent: '#42b983',
          toogleBackground : '#ffffff',
          background: '#091a28',
          textColor: '#b4b4b4',
          codeTextColor : '#ffffff',
          codeBackgroundColor : '#0e2233',
          borderColor : '#0d2538',
          blockQuoteColor : '#858585',
          highlightColor : '#d22778',
          sidebarSublink : '#b4b4b4',
          codeTypeColor : '#ffffff',
          coverBackground : 'linear-gradient(to left bottom, hsl(118, 100%, 85%) 0%,hsl(181, 100%, 85%) 100%)',
          toogleImage : 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/sun.svg)'
        },
        light: {
          accent: '#42b983',
          toogleBackground : '#091a28',
          background: '#ffffff',
          textColor: '#34495e',
          codeTextColor : '#525252',
          codeBackgroundColor : '#f8f8f8',
          borderColor : 'rgba(0, 0, 0, 0.07)',
          blockQuoteColor : '#858585',
          highlightColor : '#d22778',
          sidebarSublink : '#b4b4b4',
          codeTypeColor : '#091a28',
          coverBackground : 'linear-gradient(to left bottom, hsl(118, 100%, 85%) 0%,hsl(181, 100%, 85%) 100%)',
          toogleImage : 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/moon.svg)'
        }
      }
    }
  </script>



  <script src="./assets/js/md5.js"></script>
  <script src="./assets/js/docsify.min.js"></script>

  <!-- 图片缩放 -->
  <script src="//unpkg.com/docsify/lib/plugins/zoom-image.js"></script>
  <!-- 字数统计 -->
  <script src="//unpkg.com/docsify-count/dist/countable.js"></script>

  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="./assets/js/docsify-pagination.min.js"></script>

  <script src="./assets/js/prism-bash.js"></script>
  <script src="./assets/js/prism-sql.js"></script>
  <script src="./assets/js/prism-sql.min.js"></script>
  <script src="./assets/js/prism-java.js"></script>
  <script src="./assets/js/prism-java.min.js"></script>
  <script src="./assets/js/prism-python.js"></script>
  <script src="./assets/js/prism-python.min.js"></script>

  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>


</body>
</html>
